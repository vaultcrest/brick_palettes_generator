name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-release:

    runs-on: ubuntu-24.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate inventories
        run: |
          python generate_pab_inventory.py

      # ------------------------------------------------------------
      # PACKAGE OUTPUT DIRECTORY
      # ------------------------------------------------------------

      - name: Create release archives
        run: |
          tar \
            --exclude='__pycache__' \
            --exclude='.DS_Store' \
            -czf brick-palette-output.tar.gz output/

          zip -r \
            brick-palette-output.zip \
            output/ \
            -x "*/__pycache__/*" \
            -x "*/.DS_Store"

      # ------------------------------------------------------------
      # CREATE RELEASE
      # ------------------------------------------------------------

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

          files: |
            brick-palette-output.tar.gz
            brick-palette-output.zip
            output/**/*.xml
            output/**/*
